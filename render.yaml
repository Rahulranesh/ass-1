services:
  # -------------------------------------------------------------------------
  # BACKEND — Flask API (Python web service)
  # -------------------------------------------------------------------------
  - type: web
    name: student-portal-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT --workers 2
    healthCheckPath: /health
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: JWT_SECRET
        generateValue: true        # Render auto-generates a secure random value
      - key: JWT_EXPIRY_HOURS
        value: "24"
      - key: DATABASE_URL
        fromDatabase:
          name: student-portal-db
          property: connectionString
      # The DB connection vars (parsed from DATABASE_URL in connection.py)
      - key: DB_HOST
        fromDatabase:
          name: student-portal-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: student-portal-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: student-portal-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: student-portal-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: student-portal-db
          property: password

  # -------------------------------------------------------------------------
  # FRONTEND — Next.js Static Site
  # -------------------------------------------------------------------------
  - type: web
    name: student-portal-frontend
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build
    staticPublishPath: out
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_AWS_REGION
        value: us-east-1

# -------------------------------------------------------------------------
# DATABASE — Render managed PostgreSQL
# -------------------------------------------------------------------------
databases:
  - name: student-portal-db
    region: oregon
    plan: free
    databaseName: studentportal
    user: studentadmin
